name: axion_track
description: Axion Track - Professional Fleet Management App
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & WebSocket
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
